name: dkost
description: "Aplikasi D'Kost - Pencarian dan manajemen kost untuk penyewa."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
    
  url_launcher: ^6.3.0

  # ── Networking ───────────────────────────────────────────────
  http: ^1.3.0

  # ── Local Storage ───────────────────────────────────────────
  shared_preferences: ^2.2.0
  sqflite: ^2.2.8+4
  path_provider: ^2.0.5

  # ── Image ───────────────────────────────────────────────────
  cached_network_image: ^3.2.0
  flutter_cache_manager: ^3.3.0
  flutter_svg: ^2.2.4

  # ── UI / UX ─────────────────────────────────────────────────
  shimmer: ^3.0.0
  awesome_dialog: ^3.2.1
  flutter_native_splash: ^2.3.1
  image_picker: ^1.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ── Flutter Config ──────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    # ── Gambar lama yang masih dipakai ─────────────────────────

    # ── Asset baru D'Kost (dari screenshot assets/images) ───────
    - assets/images/Asset_2.png
    - assets/images/Asset_4.png
    - assets/images/dkos_1.png              # Logo D'Kost
    - assets/images/dkos_2.png              # Logo D'Kost
    - assets/images/dkos_3.png              # Logo D'Kost
    - assets/images/home_green.png          # Bottom nav: Dashboard aktif
    - assets/images/home_black.png          # Bottom nav: Dashboard nonaktif
    - assets/images/Keluhan_green.png       # Bottom nav: Keluhan aktif
    - assets/images/Keluhan_black.png       # Bottom nav: Keluhan nonaktif
    - assets/images/kamarku_green.png       # Bottom nav: Riwayat Kos aktif
    - assets/images/kamarku_black.png       # Bottom nav: Riwayat Kos nonaktif
    - assets/images/setting_green.png       # Bottom nav: Setting aktif
    - assets/images/setting_black.png       # Bottom nav: Setting nonaktif
    - assets/images/sinora_icon.png         # Icon chatbot
    - assets/images/person_1.png            # Avatar profil default
    - assets/images/person_2.png            # Avatar profil alternatif
    - assets/images/picture.png             # Placeholder foto profil 
    - assets/images/robot.png               # Placeholder foto kamar
    - assets/images/sinora_icon.png         # Avatar chatbot
    - assets/images/calendar_1.png          # Icon kalender (booking)
    - assets/images/attach_file.png         # Icon lampiran (keluhan)
    - assets/images/detail_informasi_akun.png # Icon info akun
    - assets/images/change-password-icon.png  # Icon ganti password
    - assets/images/logout.png                # Icon logout

# ── Splash Screen ───────────────────────────────────────────────
flutter_native_splash:
  color: "#2ECC71"
  image: assets/images/dkos_3.png
  android: true
  ios: true
  web: true

# ── Launcher Icon ───────────────────────────────────────────────
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/dkos_3.png"   # Ganti ke logo D'Kost