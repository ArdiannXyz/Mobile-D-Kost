name: dkost
description: "Aplikasi D'Kost - Pencarian dan manajemen kost untuk penyewa."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  # ── Networking ───────────────────────────────────────────────
  http: ^1.3.0

  # ── Local Storage ───────────────────────────────────────────
  shared_preferences: ^2.2.0
  sqflite: ^2.2.8+4
  path_provider: ^2.0.5

  # ── Image ───────────────────────────────────────────────────
  cached_network_image: ^3.2.0
  flutter_cache_manager: ^3.3.0
  flutter_svg: ^2.0.7

  # ── UI / UX ─────────────────────────────────────────────────
  shimmer: ^3.0.0
  awesome_dialog: ^3.2.1
  flutter_native_splash: ^2.3.1
  image_picker: ^1.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ── Flutter Config ──────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    # ── Gambar lama yang masih dipakai ─────────────────────────

    # ── Asset baru D'Kost (dari screenshot assets/images) ───────
    - assets/images/dkos 1.png              # Logo D'Kost
    - assets/images/home green (2).png      # Bottom nav: Dashboard aktif
    - assets/images/home black (2).png      # Bottom nav: Dashboard nonaktif
    - assets/images/Keluhan green.png       # Bottom nav: Keluhan aktif
    - assets/images/Keluhan black.png       # Bottom nav: Keluhan nonaktif
    - assets/images/kamarku green.png       # Bottom nav: Riwayat Kos aktif
    - assets/images/kamarku black.png       # Bottom nav: Riwayat Kos nonaktif
    - assets/images/setting green.png       # Bottom nav: Setting aktif
    - assets/images/setting black.png       # Bottom nav: Setting nonaktif
    - assets/images/person 1.png            # Avatar profil default
    - assets/images/person 2.png            # Avatar profil alternatif
    - assets/images/picture.png      
    - assets/images/robot.png           # Placeholder foto kamar
    - assets/images/calendar 1.png          # Icon kalender (booking)
    - assets/images/attach_file.png         # Icon lampiran (keluhan)
    - assets/images/detail informasi akun.png # Icon info akun
    - assets/images/change-password-icon (1).png # Icon ganti password
    - assets/images/logout (2).png          # Icon logout

# ── Splash Screen ───────────────────────────────────────────────
flutter_native_splash:
  color: "#2ECC71"                    # Hijau D'Kost (ganti dari biru lama)
  image: assets/images/splash_2.png
  android: true
  ios: true

# ── Launcher Icon ───────────────────────────────────────────────
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/dkos 1.png"   # Ganti ke logo D'Kost